services:
  db:
    image: postgres:15-alpine
    container_name: project-boss-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-boss-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_DATABASE}?schema=public
      PORT: 4444
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
    expose:
      - "4444"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-boss-frontend
    restart: always
    environment:
      NUXT_PUBLIC_API_BASE: http://backend:4444
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - default
    expose:
      - "3000"

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: project-boss-consumer
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_DATABASE}?schema=public
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - default

  frontend-customer:
    build:
      context: ./frontend-customer
      dockerfile: Dockerfile
    container_name: project-boss-frontend-customer
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE: http://backend:4444
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - default
    expose:
      - "3001"

  nginx:
    image: nginx:alpine
    container_name: project-boss-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
      - frontend-customer
    networks:
      - default

volumes:
  db_data:
  nginx_logs:

networks:
  default:
    driver: bridge
