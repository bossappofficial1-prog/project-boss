name: "Push to Dev"

on:
  push:
    branches: [develop]

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "development"
        type: choice
        options:
          - development

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend # Lokasi Dockerfile backend
          file: ./backend/Dockerfile
          push: true # Push image setelah build selesai
          # Ganti 'namadockerhub' dengan username Anda
          tags: ${{ secrets.DOCKER_USER }}/project-backend:development

  deploy_to_vps:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
