name: "Push to Dev"

on:
  push:
    branches: [develop]

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "development"
        type: choice
        options:
          - development

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Login to Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Check for changes
        uses: dorny/paths-filter@v2
        id: check-changes
        with:
          filters: |
            backend:
              - 'backend/**'
            consumer:
              - 'consumer/**'
            frontend-customer:
              - 'frontend-customer/**'

      - name: Build and push Backend
        if: steps.check-changes.outputs.backend == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER }}/project-backend:development
          build-args: |
            NODE_ENV=development
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            CLIENT_URL=${{ vars.CLIENT_URL }}

      - name: Build and push consumer
        if: steps.check-changes.outputs.consumer == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./consumer
          file: ./consumer/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER }}/project-consumer:development

      - name: Build and push frontend customer
        if: steps.check-changes.outputs.frontend-customer == 'true'
        uses: docker/build-push-action@v4
        with:
          context: ./frontend-customer
          file: ./frontend-customer/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER }}/project-frontend-customer:development
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_API_PREFIX=${{ vars.NEXT_PUBLIC_API_PREFIX }}
            NEXT_PUBLIC_SOCKET_URL=${{ vars.NEXT_PUBLIC_SOCKET_URL }}
            NEXT_PUBLIC_REMOTE_PATTERNS=${{ vars.NEXT_PUBLIC_REMOTE_PATTERNS }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            CLIENT_URL=${{ vars.CLIENT_URL }}

  deploy_to_vps:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Create  project directory on VPS if it does not exits
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/projects/boss-project/dev

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "./docker-compose.dev.yml"
          target: "~/projects/boss-project/dev"

      - name: Run Docker Compose on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd ~/projects/boss-project/dev
            docker compose -f docker-compose.dev.yml up -d
            echo "Docker Compose started successfully"
