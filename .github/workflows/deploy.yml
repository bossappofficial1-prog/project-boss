name: CI/CD to GCP

on:
  push:
    branches:
      - main
      - domain

jobs:
  lint-test-build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint & Test Backend
        working-directory: ./backend
        run: |
          npm install
        #   npm run lint
        #   npm run test

      - name: Lint & Test Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run lint
          npm run test

      - name: Build Docker Images
        run: |
          docker build -t boss-backend ./backend
          docker build -t boss-frontend ./frontend

  deploy:
    needs: lint-test-build
    name: Deploy to GCP
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd /home/ubuntu/project-boss
            git pull origin ${{ github.ref_name }} || exit 1

            docker compose down || true
            docker compose up -d --build || {
              echo "DEPLOY FAILED. Rollback..." ;
              docker compose up -d ;
              exit 1
            }
          EOF

      - name: Notify Telegram
        if: always()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🚀 Deploy ${{ job.status }}: ${{ github.repository }} - ${{ github.ref_name }}"
