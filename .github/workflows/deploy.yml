name: CI/CD for Project-Boss Monorepo

on:
  push:
    branches:
      - main # Trigger workflow setiap ada push ke branch 'main'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        id: build_backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-boss-backend:latest
          cache-from: type=gha,scope=backend-cache
          cache-to: type=gha,mode=max,scope=backend-cache

      - name: Build and push frontend image
        id: build_frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-boss-frontend:latest
          cache-from: type=gha,scope=frontend-cache
          cache-to: type=gha,mode=max,scope=frontend-cache

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code # Pastikan kode di-checkout di job deploy juga untuk akses file
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # --- MEMBUAT FILE .ENV.DEPLOY DI RUNNER ---
      - name: Create production .env.deploy file on runner
        run: |
          cat << 'EOF' > .env.deploy
          # File ini akan diisi dengan nilai dari GitHub Secrets di VPS oleh envsubst
          DB_DATABASE=${DB_DATABASE}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}
          DOCKER_USERNAME=${DOCKER_USERNAME}
          DOCKER_PASSWORD=${DOCKER_PASSWORD}
          BACKEND_DOMAIN=${BACKEND_DOMAIN}
          FRONTEND_DOMAIN=${FRONTEND_DOMAIN}
          JWT_SECRET=${JWT_SECRET}
          RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
          RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          MIDTRANS_MERCHANT_ID=${MIDTRANS_MERCHANT_ID}
          MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
          MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
          MIDTRANS_NOTIFICATION_CALLBACK_URL=${MIDTRANS_NOTIFICATION_CALLBACK_URL}
          MIDTRANS_EXPIRE_UNIT=${MIDTRANS_EXPIRE_UNIT}
          MIDTRANS_EXPIRE_DURATION=${MIDTRANS_EXPIRE_DURATION}
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_SECURE=${SMTP_SECURE}
          SMTP_PASS=${SMTP_PASS}
          SMTP_USER=${SMTP_USER}
          NUXT_PUBLIC_API_BASE=https://${BACKEND_DOMAIN}/api/v1
          EOF
        # Catatan: Variabel di atas akan diisi oleh GitHub Actions Runner sebagai environment variable
        #        sebelum skrip ini dijalankan, sehingga 'envsubst' di deploy_script.sh bisa bekerja.

      # --- MEMBUAT DAN MENTRANSFER deploy_script.sh & FILE COMPOSE KE VPS ---
      - name: Create and transfer deployment files to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Pastikan direktori deployment ada di VPS
          ssh ${VPS_USER}@${VPS_HOST} "mkdir -p ${DEPLOY_PATH}"

          # --- Konten deploy_script.sh ---
          cat << 'SCRIPT_EOF' > deploy_script.sh
          #!/bin/bash
          set -e # Keluar jika ada perintah yang gagal

          echo "=== Memulai Proses Deployment ==="
          echo "Lokasi Deployment: $DEPLOY_PATH"

          # Pindah ke direktori deployment
          if [ ! -d "$DEPLOY_PATH" ]; then
              echo "ERROR: Direktori deployment $DEPLOY_PATH tidak ditemukan."
              exit 1
          fi
          cd "$DEPLOY_PATH" || { echo "ERROR: Gagal berpindah ke direktori $DEPLOY_PATH"; exit 1; }

          echo "=== Memuat dan membuat file .env ==="
          # Memastikan envsubst terinstal
          if ! command -v envsubst &> /dev/null; then
              echo "ERROR: 'envsubst' (bagian dari gettext) tidak ditemukan di VPS Anda. Harap instal dengan 'sudo apt-get install gettext'."
              exit 1
          fi

          # Menggunakan envsubst untuk mengisi nilai dari variabel lingkungan
          # ke dalam file .env.deploy dan menyimpannya sebagai .env
          envsubst < .env.deploy > .env.tmp && mv .env.tmp .env
          chmod 644 .env
          echo "File .env berhasil dibuat dan diisi."

          echo "=== Login ke Docker Hub ==="
          # Menggunakan file sementara untuk password demi mengatasi isu TTY
          printf "%s" "$DOCKER_PASSWORD" > docker_password_file.txt
          chmod 600 docker_password_file.txt # Hanya pemilik yang bisa membaca/menulis
          cat docker_password_file.txt | docker login --username "$DOCKER_USERNAME" --password-stdin
          rm docker_password_file.txt # Hapus file password setelah digunakan

          if [ $? -ne 0 ]; then
              echo "ERROR: Login Docker gagal. Membatalkan deployment."
              exit 1
          fi
          echo "Login Docker berhasil."

          echo "=== Menghentikan container yang ada (jika ada) ==="
          # Gunakan --remove-orphans untuk menghapus container lama.
          # Gunakan --rmi all untuk menghapus image yang tidak terpakai oleh Compose ini.
          # Gunakan || true agar perintah ini tidak menghentikan skrip jika terjadi error (misal jaringan masih terhubung)
          docker compose -f docker-compose.yml -f docker-compose.prod.yml down --remove-orphans --rmi all || true

          echo "=== Menarik image Docker terbaru ==="
          docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend

          echo "=== Menjalankan migrasi database Prisma ==="
          docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm backend npx prisma migrate deploy

          echo "=== Memulai layanan Docker Compose ==="
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

          echo "=== Memverifikasi deployment ==="
          sleep 10 # Beri waktu agar container sempat booting
          docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

          echo "=== Membersihkan image lama ==="
          docker image prune -f

          echo "=== Deployment selesai dengan sukses ==="
          SCRIPT_EOF

          # Berikan izin eksekusi pada skrip di runner sebelum transfer
          chmod +x deploy_script.sh

          # Salin semua file yang diperlukan ke VPS
          scp deploy_script.sh ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/
          scp .env.deploy ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/
          scp docker-compose.yml ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/ # <-- Pastikan pakai .yml
          scp docker-compose.prod.yml ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/ # <-- Pastikan pakai .yml

          echo "Semua file deployment berhasil ditransfer."

      # --- MENGEKSEKUSI SKRIP DEPLOYMENT DI VPS ---
      - name: Execute Deployment Script on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          # Semua secrets ini akan diekspor sebagai environment variable ke sesi SSH.
          # deploy_script.sh akan langsung membacanya dari environment.
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          BACKEND_DOMAIN: ${{ secrets.BACKEND_DOMAIN }}
          FRONTEND_DOMAIN: ${{ secrets.FRONTEND_DOMAIN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RATE_LIMIT_WINDOW_MS: ${{ secrets.RATE_LIMIT_WINDOW_MS }}
          RATE_LIMIT_MAX_REQUESTS: ${{ secrets.RATE_LIMIT_MAX_REQUESTS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MIDTRANS_MERCHANT_ID: ${{ secrets.MIDTRANS_MERCHANT_ID }}
          MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY }}
          MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY }}
          MIDTRANS_NOTIFICATION_CALLBACK_URL: ${{ secrets.MIDTRANS_NOTIFICATION_CALLBACK_URL }}
          MIDTRANS_EXPIRE_UNIT: ${{ secrets.MIDTRANS_EXPIRE_UNIT }}
          MIDTRANS_EXPIRE_DURATION: ${{ secrets.MIDTRANS_EXPIRE_DURATION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}

        run: |
          echo "Menghubungkan ke VPS untuk menjalankan skrip deployment..."
          # Jalankan skrip deploy_script.sh di VPS, pastikan env vars diekspor
          # Menggunakan -t untuk alokasi TTY, yang dapat membantu Docker login
          ssh -t ${VPS_USER}@${VPS_HOST} "export DEPLOY_PATH='${DEPLOY_PATH}' && \
            export DB_DATABASE='${DB_DATABASE}' && \
            export DB_USER='${DB_USER}' && \
            export DB_PASSWORD='${DB_PASSWORD}' && \
            export DOCKER_USERNAME='${DOCKER_USERNAME}' && \
            export DOCKER_PASSWORD='${DOCKER_PASSWORD}' && \
            export BACKEND_DOMAIN='${BACKEND_DOMAIN}' && \
            export FRONTEND_DOMAIN='${FRONTEND_DOMAIN}' && \
            export JWT_SECRET='${JWT_SECRET}' && \
            export RATE_LIMIT_WINDOW_MS='${RATE_LIMIT_WINDOW_MS}' && \
            export RATE_LIMIT_MAX_REQUESTS='${RATE_LIMIT_MAX_REQUESTS}' && \
            export GOOGLE_CLIENT_ID='${GOOGLE_CLIENT_ID}' && \
            export GOOGLE_CLIENT_SECRET='${GOOGLE_CLIENT_SECRET}' && \
            export MIDTRANS_MERCHANT_ID='${MIDTRANS_MERCHANT_ID}' && \
            export MIDTRANS_SERVER_KEY='${MIDTRANS_SERVER_KEY}' && \
            export MIDTRANS_CLIENT_KEY='${MIDTRANS_CLIENT_KEY}' && \
            export MIDTRANS_NOTIFICATION_CALLBACK_URL='${MIDTRANS_NOTIFICATION_CALLBACK_URL}' && \
            export MIDTRANS_EXPIRE_UNIT='${MIDTRANS_EXPIRE_UNIT}' && \
            export MIDTRANS_EXPIRE_DURATION='${MIDTRANS_EXPIRE_DURATION}' && \
            export SMTP_HOST='${SMTP_HOST}' && \
            export SMTP_PORT='${SMTP_PORT}' && \
            export SMTP_SECURE='${SMTP_SECURE}' && \
            export SMTP_PASS='${SMTP_PASS}' && \
            export SMTP_USER='${SMTP_USER}' && \
            chmod +x ${DEPLOY_PATH}/deploy_script.sh && \
            ${DEPLOY_PATH}/deploy_script.sh"
          echo "Proses deployment di VPS dipicu."

      # --- CLEANUP LOKAL ---
      - name: Cleanup local deployment files
        if: always()
        run: rm -f deploy_script.sh .env.deploy
