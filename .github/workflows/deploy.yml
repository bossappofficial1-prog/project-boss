name: CI/CD for Project-Boss Monorepo

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        id: build_backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-boss-backend:latest
          cache-from: type=gha,scope=backend-cache
          cache-to: type=gha,mode=max,scope=backend-cache

      - name: Build and push frontend image
        id: build_frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-boss-frontend:latest
          cache-from: type=gha,scope=frontend-cache
          cache-to: type=gha,mode=max,scope=frontend-cache

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer Docker Compose files to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh ${VPS_USER}@${VPS_HOST} "mkdir -p ${DEPLOY_PATH}"
          scp docker-compose.yaml ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/
          scp docker-compose.prod.yaml ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/
          echo "Docker Compose files transferred."

      - name: Create deployment script
        run: |
          cat << 'SCRIPT_EOF' > deploy_script.sh
          #!/bin/bash
          set -e  # Exit on any error

          echo "=== Starting Deployment Process ==="
          echo "Deploy Path: $DEPLOY_PATH"

          # Navigate to deployment directory
          if [ ! -d "$DEPLOY_PATH" ]; then
              echo "ERROR: Deploy path $DEPLOY_PATH does not exist"
              exit 1
          fi
          cd "$DEPLOY_PATH"

          echo "=== Logging into Docker Hub ==="
          echo "$DOCKER_PASSWORD" | docker login --username "$DOCKER_USERNAME" --password-stdin

          if [ $? -ne 0 ]; then
              echo "ERROR: Docker login failed. Aborting deployment."
              exit 1
          fi
          echo "Docker login successful."

          echo "=== Creating .env file ==="
          cat << 'ENV_EOF' > .env
          # --- Database Variables ---
          DB_DATABASE=${DB_DATABASE}
          DB_USER=${DB_USER}
          DB_PASSWORD=${DB_PASSWORD}

          # --- Application Domains ---
          BACKEND_DOMAIN=${BACKEND_DOMAIN}
          FRONTEND_DOMAIN=${FRONTEND_DOMAIN}

          # --- General/Shared Variables ---
          JWT_SECRET=${JWT_SECRET}
          NODE_ENV=production

          # --- Rate Limit Configuration ---
          RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
          RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}

          # --- Google Configuration ---
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

          # --- Midtrans Configuration ---
          MIDTRANS_MERCHANT_ID=${MIDTRANS_MERCHANT_ID}
          MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
          MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
          MIDTRANS_NOTIFICATION_CALLBACK_URL=${MIDTRANS_NOTIFICATION_CALLBACK_URL}
          MIDTRANS_EXPIRE_UNIT=${MIDTRANS_EXPIRE_UNIT}
          MIDTRANS_EXPIRE_DURATION=${MIDTRANS_EXPIRE_DURATION}

          # --- SMTP Configuration ---
          SMTP_HOST=${SMTP_HOST}
          SMTP_PORT=${SMTP_PORT}
          SMTP_SECURE=${SMTP_SECURE}
          SMTP_PASS=${SMTP_PASS}
          SMTP_USER=${SMTP_USER}

          # --- Frontend Configuration ---
          NUXT_PUBLIC_API_BASE=https://${BACKEND_DOMAIN}/api/v1
          ENV_EOF

          # Substitute environment variables in .env file
          envsubst < .env > .env.tmp && mv .env.tmp .env
          chmod 644 .env

          echo "=== Environment file created successfully ==="

          echo "=== Stopping existing containers ==="
          docker compose -f docker-compose.yaml -f docker-compose.prod.yaml down || true

          echo "=== Pulling latest Docker images ==="
          docker compose -f docker-compose.yaml -f docker-compose.prod.yaml pull backend frontend

          echo "=== Running database migrations ==="
          docker compose -f docker-compose.yaml -f docker-compose.prod.yaml run --rm backend npx prisma migrate deploy

          echo "=== Starting services ==="
          docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d --remove-orphans

          echo "=== Verifying deployment ==="
          sleep 10
          docker compose -f docker-compose.yaml -f docker-compose.prod.yaml ps

          echo "=== Cleaning up old images ==="
          docker image prune -f

          echo "=== Deployment completed successfully ==="
          SCRIPT_EOF

          chmod +x deploy_script.sh

      - name: Create environment file
        run: |
          cat << EOF > .env.deploy
          DEPLOY_PATH=${{ secrets.DEPLOY_PATH }}
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}
          BACKEND_DOMAIN=${{ secrets.BACKEND_DOMAIN }}
          FRONTEND_DOMAIN=${{ secrets.FRONTEND_DOMAIN }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          RATE_LIMIT_WINDOW_MS=${{ secrets.RATE_LIMIT_WINDOW_MS }}
          RATE_LIMIT_MAX_REQUESTS=${{ secrets.RATE_LIMIT_MAX_REQUESTS }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          MIDTRANS_MERCHANT_ID=${{ secrets.MIDTRANS_MERCHANT_ID }}
          MIDTRANS_SERVER_KEY=${{ secrets.MIDTRANS_SERVER_KEY }}
          MIDTRANS_CLIENT_KEY=${{ secrets.MIDTRANS_CLIENT_KEY }}
          MIDTRANS_NOTIFICATION_CALLBACK_URL=${{ secrets.MIDTRANS_NOTIFICATION_CALLBACK_URL }}
          MIDTRANS_EXPIRE_UNIT=${{ secrets.MIDTRANS_EXPIRE_UNIT }}
          MIDTRANS_EXPIRE_DURATION=${{ secrets.MIDTRANS_EXPIRE_DURATION }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_SECURE=${{ secrets.SMTP_SECURE }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          EOF

      - name: Deploy to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Ensure deployment directory exists on VPS
          ssh ${VPS_USER}@${VPS_HOST} "mkdir -p ${DEPLOY_PATH}"

          # Transfer files to VPS
          scp .env.deploy ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/
          scp deploy_script.sh ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/

          # Execute deployment script on VPS
          ssh ${VPS_USER}@${VPS_HOST} "cd ${DEPLOY_PATH} && source .env.deploy && chmod +x deploy_script.sh && ./deploy_script.sh"

      - name: Cleanup deployment files
        if: always()
        run: rm -f deploy_script.sh .env.deploy
