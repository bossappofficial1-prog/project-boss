name: CI/CD to GCP

on:
  push:
    branches:
      - main
      - domain

jobs:
  lint-test-build:
    name: Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lint & Test Backend
        working-directory: ./backend
        run: |
          npm install
          # npm run lint
          # npm run test

      - name: Build Docker Images
        run: |
          docker build -t boss-backend ./backend
          # docker build -t boss-frontend ./frontend

  deploy:
    needs: lint-test-build
    name: Deploy to GCP
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy via SSH
        run: |
          echo "
            if [ ! -d project-boss ]; then
              git clone https://${{ secrets.GITHUB_USERNAME }}:${{ secrets.ENV_GITHUB_PAT }}@github.com/PitokDf/project-boss.git || exit 1
            fi

            cd project-boss
            git pull origin ${{ github.ref_name }} || exit 1

            mkdir -p backend

            echo \"BASE_URL=${{ secrets.ENV_BASE_URL }}\" > ./backend/.env.production
            echo \"PORT=${{ secrets.ENV_PORT }}\" >> ./backend/.env.production
            echo \"JWT_SECRET=${{ secrets.ENV_JWT_SECRET }}\" >> ./backend/.env.production
            echo \"FRONTEND_URL=${{ secrets.ENV_FRONTEND_URL }}\" >> ./backend/.env.production
            echo \"DATABASE_URL=${{ secrets.ENV_DATABASE_URL }}\" >> ./backend/.env.production

            echo \"MIDTRANS_MERCHANT_ID=${{ secrets.ENV_MIDTRANS_MERCHANT_ID }}\" >> ./backend/.env.production
            echo \"MIDTRANS_SERVER_KEY=${{ secrets.ENV_MIDTRANS_SERVER_KEY }}\" >> ./backend/.env.production
            echo \"MIDTRANS_CLIENT_KEY=${{ secrets.ENV_MIDTRANS_CLIENT_KEY }}\" >> ./backend/.env.production
            echo \"MIDTRANS_NOTIFICATION_CALLBACK_URL=${{ secrets.ENV_MIDTRANS_NOTIFICATION_CALLBACK_URL }}\" >> ./backend/.env.production
            echo \"MIDTRANS_EXPIRE_UNIT=${{ secrets.ENV_MIDTRANS_EXPIRE_UNIT }}\" >> ./backend/.env.production
            echo \"MIDTRANS_EXPIRE_DURATION=${{ secrets.ENV_MIDTRANS_EXPIRE_DURATION }}\" >> ./backend/.env.production

            echo \"RATE_LIMIT_WINDOW_MS=${{ secrets.ENV_RATE_LIMIT_WINDOW_MS }}\" >> ./backend/.env.production
            echo \"RATE_LIMIT_MAX_REQUESTS=${{ secrets.ENV_RATE_LIMIT_MAX_REQUESTS }}\" >> ./backend/.env.production

            echo \"GOOGLE_CLIENT_ID=${{ secrets.ENV_GOOGLE_CLIENT_ID }}\" >> ./backend/.env.production
            echo \"GOOGLE_CLIENT_SECRET=${{ secrets.ENV_GOOGLE_CLIENT_SECRET }}\" >> ./backend/.env.production

            docker compose down || true
            docker compose up -d --build || {
              echo \"❌ DEPLOY FAILED. Rolling back...\"
              docker compose up -d
              exit 1
            }
          " | ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}

      - name: Notify Telegram
        if: always()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🚀 Deploy ${{ job.status }}: ${{ github.repository }} - ${{ github.ref_name }}"
