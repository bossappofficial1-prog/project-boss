name: CI/CD for Project-Boss Monorepo

on:
  push:
    branches:
      - main

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        id: build_backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-boss-backend:latest
          cache-from: type=gha,scope=backend-cache
          cache-to: type=gha,mode=max,scope=backend-cache

      - name: Build and push frontend image
        id: build_frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-boss-frontend:latest
          cache-from: type=gha,scope=frontend-cache
          cache-to: type=gha,mode=max,scope=frontend-cache

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer Docker Compose files to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh ${VPS_USER}@${VPS_HOST} "mkdir -p ${DEPLOY_PATH}"
          scp docker-compose.yaml ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/
          scp docker-compose.prod.yaml ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/
          echo "Docker Compose files transferred."

      - name: Deploy Docker Compose to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          BACKEND_DOMAIN: ${{ secrets.BACKEND_DOMAIN }}
          FRONTEND_DOMAIN: ${{ secrets.FRONTEND_DOMAIN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RATE_LIMIT_WINDOW_MS: ${{ secrets.RATE_LIMIT_WINDOW_MS }}
          RATE_LIMIT_MAX_REQUESTS: ${{ secrets.RATE_LIMIT_MAX_REQUESTS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          MIDTRANS_MERCHANT_ID: ${{ secrets.MIDTRANS_MERCHANT_ID }}
          MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY }}
          MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY }}
          MIDTRANS_NOTIFICATION_CALLBACK_URL: ${{ secrets.MIDTRANS_NOTIFICATION_CALLBACK_CALLBACK_URL }}
          MIDTRANS_EXPIRE_UNIT: ${{ secrets.MIDTRANS_EXPIRE_UNIT }}
          MIDTRANS_EXPIRE_DURATION: ${{ secrets.MIDTRANS_EXPIRE_DURATION }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}

        run: |
          echo "Connecting to VPS and deploying via Docker Compose..."
          # Perubahan di baris ini:
          ssh -t ${VPS_USER}@${VPS_HOST} << 'EOF'
            cd ${DEPLOY_PATH}

            echo "Logging into Docker Hub..."
            echo "${DOCKER_PASSWORD}" | docker login --username ${DOCKER_USERNAME} --password-stdin
            # Pemeriksaan status login
            if [ $? -ne 0 ]; then
                echo "Docker login failed. Aborting deployment."
                exit 1
            fi

            echo "Creating/updating .env file on VPS..."
            cat << EOT_ENV | tee .env > /dev/null
            # --- Variabel Database ---
            DB_DATABASE=${DB_DATABASE}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}

            # --- Domain Aplikasi ---
            BACKEND_DOMAIN=${BACKEND_DOMAIN}
            FRONTEND_DOMAIN=${FRONTEND_DOMAIN}

            # --- Variabel Umum/Bersama ---
            JWT_SECRET=${JWT_SECRET}
            NODE_ENV=production

            # --- Rate Limit configuration (untuk backend) ---
            RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
            RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}

            # --- Google configuration (untuk backend) ---
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

            # --- Midtrans configuration (untuk backend) ---
            MIDTRANS_MERCHANT_ID=${MIDTRANS_MERCHANT_ID}
            MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
            MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
            MIDTRANS_NOTIFICATION_CALLBACK_URL=${MIDTRANS_NOTIFICATION_CALLBACK_URL}
            MIDTRANS_EXPIRE_UNIT=${MIDTRANS_EXPIRE_UNIT}
            MIDTRANS_EXPIRE_DURATION=${MIDTRANS_EXPIRE_DURATION}

            # --- SMTP Configuration (untuk backend) ---
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_SECURE=${SMTP_SECURE}
            SMTP_PASS=${SMTP_PASS}
            SMTP_USER=${SMTP_USER}

            NUXT_PUBLIC_API_BASE=https://${BACKEND_DOMAIN}/api/v1

          EOT_ENV
            
            chmod 644 .env

            echo "Pulling latest Docker images..."
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml pull backend frontend

            echo "Running Prisma migrations..."
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml run --rm backend npx prisma migrate deploy

            echo "Starting Docker Compose services..."
            docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d --remove-orphans

            echo "Cleaning up old Docker images..."
            docker image prune -f

            echo "Deployment finished."
          EOF
          echo "Deployment process initiated on VPS."
