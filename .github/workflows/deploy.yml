name: CI/CD for Project-Boss Monorepo

on:
  push:
    branches:
      - main # Trigger workflow setiap ada push ke branch 'main'

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        id: build_backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend # Path ke Dockerfile backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-boss-backend:latest # Tag image Anda
          cache-from: type=gha,scope=backend-cache
          cache-to: type=gha,mode=max,scope=backend-cache

      - name: Build and push frontend image
        id: build_frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend # Path ke Dockerfile frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/project-boss-frontend:latest # Tag image Anda
          cache-from: type=gha,scope=frontend-cache
          cache-to: type=gha,mode=max,scope=frontend-cache

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push # Job ini akan berjalan setelah 'build_and_push' selesai
    # environment: production # Opsional: untuk mengontrol deployment ke lingkungan produksi
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer Docker Compose files to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          # Buat direktori deployment di VPS jika belum ada
          ssh ${VPS_USER}@${VPS_HOST} "mkdir -p ${DEPLOY_PATH}"
          # Salin file docker-compose.yml dan docker-compose.prod.yml ke VPS
          scp docker-compose.yml ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/
          scp docker-compose.prod.yml ${VPS_USER}@${VPS_HOST}:${DEPLOY_PATH}/
          echo "Docker Compose files transferred."

      - name: Deploy Docker Compose to VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          BACKEND_DOMAIN: ${{ secrets.BACKEND_DOMAIN }}
          FRONTEND_DOMAIN: ${{ secrets.FRONTEND_DOMAIN }}

          # Variabel Umum/Bersama
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          RATE_LIMIT_WINDOW_MS: ${{ secrets.RATE_LIMIT_WINDOW_MS }}
          RATE_LIMIT_MAX_REQUESTS: ${{ secrets.RATE_LIMIT_MAX_REQUESTS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

          # Variabel Midtrans
          MIDTRANS_MERCHANT_ID: ${{ secrets.MIDTRANS_MERCHANT_ID }}
          MIDTRANS_SERVER_KEY: ${{ secrets.MIDTRANS_SERVER_KEY }}
          MIDTRANS_CLIENT_KEY: ${{ secrets.MIDTRANS_CLIENT_KEY }}
          MIDTRANS_NOTIFICATION_CALLBACK_URL: ${{ secrets.MIDTRANS_NOTIFICATION_CALLBACK_URL }}
          MIDTRANS_EXPIRE_UNIT: ${{ secrets.MIDTRANS_EXPIRE_UNIT }}
          MIDTRANS_EXPIRE_DURATION: ${{ secrets.MIDTRANS_EXPIRE_DURATION }}

          # Variabel SMTP (untuk produksi)
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_USER: ${{ secrets.SMTP_USER }}

        run: |
          echo "Connecting to VPS and deploying via Docker Compose..."
          ssh ${VPS_USER}@${VPS_HOST} << 'EOF'
            cd ${DEPLOY_PATH}

            # Login ke Docker Hub di VPS Anda
            echo "Logging into Docker Hub..."
            echo "${DOCKER_PASSWORD}" | docker login --username ${DOCKER_USERNAME} --password-stdin

            # Buat atau update file .env di VPS dari GitHub Secrets
            echo "Creating/updating .env file on VPS..."
            cat << EOT_ENV > .env
            # --- Variabel Database ---
            DB_DATABASE=${DB_DATABASE}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}

            # --- Domain Aplikasi ---
            BACKEND_DOMAIN=${BACKEND_DOMAIN}
            FRONTEND_DOMAIN=${FRONTEND_DOMAIN}

            # --- Variabel Umum/Bersama ---
            JWT_SECRET=${JWT_SECRET}
            NODE_ENV=production # Pastikan NODE_ENV diatur ke production di VPS

            # --- Rate Limit configuration (untuk backend) ---
            RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
            RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}

            # --- Google configuration (untuk backend) ---
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

            # --- Midtrans configuration (untuk backend) ---
            MIDTRANS_MERCHANT_ID=${MIDTRANS_MERCHANT_ID}
            MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY}
            MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY}
            MIDTRANS_NOTIFICATION_CALLBACK_URL=${MIDTRANS_NOTIFICATION_CALLBACK_URL}
            MIDTRANS_EXPIRE_UNIT=${MIDTRANS_EXPIRE_UNIT}
            MIDTRANS_EXPIRE_DURATION=${MIDTRANS_EXPIRE_DURATION}

            # --- SMTP Configuration (untuk backend) ---
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_SECURE=${SMTP_SECURE}
            SMTP_PASS=${SMTP_PASS}
            SMTP_USER=${SMTP_USER}

            NUXT_PUBLIC_API_BASE=https://${BACKEND_DOMAIN}/api/v1

            EOT_ENV

            # Pull image terbaru
            echo "Pulling latest Docker images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull backend frontend

            # Jalankan migrasi database Prisma
            echo "Running Prisma migrations..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm backend npx prisma migrate deploy

            # Jalankan container Docker Compose
            echo "Starting Docker Compose services..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

            echo "Cleaning up old Docker images..."
            docker image prune -f

            echo "Deployment finished."
          EOF
          echo "Deployment process initiated on VPS."
