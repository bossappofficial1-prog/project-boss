name: "Deploy Profile"

on:
  push:
    branches:
      - main
    paths:
      - 'profile/**'
      - '.github/workflows/deploy-profile.yml'
      - 'docker-compose.prod.yml'

jobs:
  deploy_prod:
    name: Build & Deploy Prod
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Profile
        uses: docker/build-push-action@v6
        with:
          context: ./profile
          file: ./profile/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER }}/project-profile:production
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create project directory on VPS if it does not exist
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_SSH_USER }}
          key: ${{ secrets.PROD_VPS_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/projects/boss-project/prod

      - name: Copy docker-compose file to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_SSH_USER }}
          key: ${{ secrets.PROD_VPS_SSH_PRIVATE_KEY }}
          source: "./docker-compose.prod.yml"
          target: "~/projects/boss-project/prod"

      - name: Deploy to Prod
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_SSH_USER }}
          key: ${{ secrets.PROD_VPS_SSH_PRIVATE_KEY }}
          script: |
            cd ~/projects/boss-project/prod
            echo "Pulling latest profile image..."
            docker compose -f docker-compose.prod.yml pull profile
            echo "Starting profile service..."
            docker compose -f docker-compose.prod.yml up -d --no-deps profile
            echo "Profile deployed successfully."
            docker image prune -af || true

      - name: Send Telegram Notification (Deploy)
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🚀 **Deploy Status Profile (Prod)**
            **Status:** ${{ job.status }}
            **Triggered by:** ${{ github.actor }}
            **Commit:** ${{ github.sha }}
            [View Commit](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
