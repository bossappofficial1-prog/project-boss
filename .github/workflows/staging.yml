name: 🚀 Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - development

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/project-boss
  NODE_VERSION: '18'

jobs:
  # Job untuk build dan push Docker images
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      backend-image: ${{ steps.meta-backend.outputs.tags }}
      frontend-image: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=staging-{{sha}}
            type=raw,value=staging-latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend-staging
          cache-to: type=gha,mode=max,scope=backend-staging
          build-args: |
            NODE_ENV=staging

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=staging-{{sha}}
            type=raw,value=staging-latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend-staging
          cache-to: type=gha,mode=max,scope=frontend-staging
          build-args: |
            NODE_ENV=staging

  # Job untuk deploy ke staging server
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Add staging server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.STAGING_VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create staging deployment script
        run: |
          cat << 'EOF' > staging-deploy.sh
          #!/bin/bash
          set -e

          echo "🚀 Starting Staging Deployment..."
          echo "📍 Deployment Path: ${{ secrets.STAGING_DEPLOY_PATH }}"
          echo "🌐 Server: ${{ secrets.STAGING_VPS_HOST }}"

          # Create deployment directory
          mkdir -p ${{ secrets.STAGING_DEPLOY_PATH }}
          cd ${{ secrets.STAGING_DEPLOY_PATH }}

          # Backup current environment
          if [ -f ".env" ]; then
            cp .env .env.backup.$(date +%Y%m%d_%H%M%S)
            echo "📦 Environment backup created"
          fi

          # Login to Docker Hub
          echo "🐳 Logging into Docker Hub..."
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login --username ${{ secrets.DOCKER_USERNAME }} --password-stdin

          # Pull latest images
          echo "📥 Pulling latest staging images..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/project-boss-backend:staging-latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/project-boss-frontend:staging-latest

          # Stop existing containers gracefully
          echo "🛑 Stopping existing containers..."
          docker compose -f docker-compose.yml -f docker-compose.dev.yml down --timeout 30 || true

          # Clean up unused images
          echo "🧹 Cleaning up old images..."
          docker image prune -f

          # Start staging environment
          echo "▶️  Starting staging environment..."
          docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d

          # Wait for services to be healthy
          echo "⏳ Waiting for services to be ready..."
          sleep 30

          # Run database migrations
          echo "🗄️  Running database migrations..."
          docker compose -f docker-compose.yml -f docker-compose.dev.yml exec -T backend npx prisma migrate deploy || echo "Migration completed or no migrations needed"

          # Health check
          echo "🏥 Running health checks..."
          docker compose -f docker-compose.yml -f docker-compose.dev.yml ps

          # Show logs
          echo "📋 Recent logs:"
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs --tail=20

          echo "✅ Staging deployment completed successfully!"
          echo "🌐 Frontend: http://${{ secrets.STAGING_VPS_HOST }}:3000"
          echo "🔧 Backend: http://${{ secrets.STAGING_VPS_HOST }}:4444"
          EOF

          chmod +x staging-deploy.sh

      - name: Transfer deployment files
        run: |
          echo "📤 Transferring deployment files to staging server..."
          scp staging-deploy.sh ${{ secrets.STAGING_VPS_USER }}@${{ secrets.STAGING_VPS_HOST }}:${{ secrets.STAGING_DEPLOY_PATH }}/
          scp docker-compose.yml ${{ secrets.STAGING_VPS_USER }}@${{ secrets.STAGING_VPS_HOST }}:${{ secrets.STAGING_DEPLOY_PATH }}/
          scp docker-compose.dev.yml ${{ secrets.STAGING_VPS_USER }}@${{ secrets.STAGING_VPS_HOST }}:${{ secrets.STAGING_DEPLOY_PATH }}/

      - name: Execute deployment on staging server
        run: |
          echo "🚀 Executing deployment on staging server..."
          ssh ${{ secrets.STAGING_VPS_USER }}@${{ secrets.STAGING_VPS_HOST }} "cd ${{ secrets.STAGING_DEPLOY_PATH }} && ./staging-deploy.sh"

      - name: Cleanup deployment files
        if: always()
        run: |
          rm -f staging-deploy.sh
          echo "🧹 Local cleanup completed"

  # Job untuk post-deployment tests
  post-deployment-test:
    name: Post-Deployment Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for staging to be ready
        run: sleep 60

      - name: Health check - Backend
        run: |
          echo "🔍 Testing backend health..."
          curl -f http://${{ secrets.STAGING_VPS_HOST }}:4444/health || curl -f http://${{ secrets.STAGING_VPS_HOST }}:4444/api/health || echo "Health endpoint not available"

      - name: Health check - Frontend
        run: |
          echo "🔍 Testing frontend availability..."
          curl -f http://${{ secrets.STAGING_VPS_HOST }}:3000 || echo "Frontend not responding"

      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Staging deployment ${{ job.status == 'success' && 'successful ✅' || 'failed ❌' }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
