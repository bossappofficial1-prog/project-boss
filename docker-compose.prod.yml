services:
  backend:
    image: ${DOCKER_USERNAME}/project-boss-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_DATABASE}?schema=public
      PORT: 4444
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      MIDTRANS_MERCHANT_ID: ${MIDTRANS_MERCHANT_ID}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_NOTIFICATION_CALLBACK_URL: ${MIDTRANS_NOTIFICATION_CALLBACK_URL}
      MIDTRANS_EXPIRE_UNIT: ${MIDTRANS_EXPIRE_UNIT}
      MIDTRANS_EXPIRE_DURATION: ${MIDTRANS_EXPIRE_DURATION}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_USER: ${SMTP_USER}
    networks:
      - traefik-net
      - app-network
    depends_on:
      - db
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4444/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.backend.rule=Host(`${BACKEND_DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.backend.loadbalancer.server.port=4444"
      - "traefik.http.middlewares.backend-headers.headers.SSLRedirect=true"
      - "traefik.http.middlewares.backend-headers.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.backend-headers.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.backend-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.backend-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.backend-headers.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.backend-headers.headers.STSPreload=true"
      - "traefik.http.routers.backend.middlewares=backend-headers"

  frontend:
    image: ${DOCKER_USERNAME}/project-boss-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NUXT_PUBLIC_API_BASE: https://${BACKEND_DOMAIN}
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      NODE_ENV: production
    networks:
      - traefik-net
      - app-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-net"
      - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=mytlschallenge"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.frontend-headers.headers.SSLRedirect=true"
      - "traefik.http.middlewares.frontend-headers.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.frontend-headers.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.frontend-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.frontend-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.frontend-headers.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.frontend-headers.headers.STSPreload=true"
      - "traefik.http.routers.frontend.middlewares=frontend-headers"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DATABASE}"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:

networks:
  traefik-net:
    external: true
  app-network:
    driver: bridge
