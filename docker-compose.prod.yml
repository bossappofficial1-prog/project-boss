services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"
    networks:
      - default

  # 3. RabbitMQ (dengan plugin Management UI)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - default
    volumes:
    - rabbitmq_data:/var/lib/rabbitmq

  # 4. Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.1
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  backend:
    image: ${DOCKER_USER:-pitok}/project-backend:production
    restart: unless-stopped
    env_file:
      - .env.backend
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      ELASTIC_NODE: http://elasticsearch:9200
      PORT: 1234
    ports:
      - "1234:1234"
    volumes:
      - ./uploads:/app/uploads
      - ./sessions:/app/sessions
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1234 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - default

  consumer:
    image: ${DOCKER_USER:-pitok}/project-consumer:production
    restart: unless-stopped
    env_file:
      - .env.consumer
    environment:
      - BACKEND_API_URL=http://backend:1234/api/v1
      - RABBITMQ_URL=amqp://rabbitmq
      - NODE_ENV=production
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - default

  customer:
    image: ${DOCKER_USER:-pitok}/project-customer:production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVER_API_URL: https://api.bossapp.id/api/v1
    ports:
      - "3000:3000"
    env_file:
      - .env.frontend-customer
    networks:
      - default

  dashboard:
    image: ${DOCKER_USER:-pitok}/project-dashboard:production
    restart: unless-stopped
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
    env_file:
      - .env.dashboard
    networks:
      - default

  profile:
    image: ${DOCKER_USER:-pitok}/project-profile:production
    restart: unless-stopped
    ports:
      - "3020:80"
    networks:
      - default

  nginx-proxy-manager:
    image: "jc21/nginx-proxy-manager:latest"
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - default

networks:
  default:
    driver: bridge

volumes:
  rabbitmq_data:
  es_data:
