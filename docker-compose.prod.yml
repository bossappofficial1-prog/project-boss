services:
  redis:
    image: redis:7-alpine
    deploy:
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      restart_policy:
        condition: any
    networks:
      - default

  backend:
    image: ${DOCKER_USER:-pitok}/project-backend:production
    env_file:
      - .env.backend
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 1234
    ports:
      - "1234:1234"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1234 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - default

  consumer:
    image: ${DOCKER_USER:-pitok}/project-consumer:production
    env_file:
      - .env.consumer
    environment:
      - BACKEND_API_URL=http://backend:1234/api/v1
      - RABBITMQ_URL=amqp://rabbitmq
      - NODE_ENV=production
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 5s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - default

  frontend-customer:
    image: ${DOCKER_USER:-pitok}/project-frontend-customer:production
    environment:
      NODE_ENV: production
      SERVER_API_URL: https://api.bossapp.id/api/v1
    ports:
      - "3000:3000"
    env_file:
      - .env.frontend-customer
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - default

  dashboard:
    image: ${DOCKER_USER:-pitok}/project-dashboard:production
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: production
    env_file:
      - .env.dashboard
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - default

  profile:
    image: ${DOCKER_USER:-pitok}/project-profile:production
    ports:
      - "3020:80"
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - default

  nginx-proxy-manager:
    image: "jc21/nginx-proxy-manager:latest"
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    networks:
      - default

networks:
  default:
    driver: overlay
