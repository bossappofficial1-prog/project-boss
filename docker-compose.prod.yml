services:
  backend:
    image: ${DOCKER_USERNAME}/project-boss-backend:latest # Menggunakan image yang sudah di-push
    build: # Pertahankan bagian build agar `docker compose pull` tetap bisa fallback ke build jika image tidak ditemukan
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4444:4444"
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_DATABASE}?schema=public
      PORT: 4444
      NODE_ENV: production
      BASE_URL: ${BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      MIDTRANS_MERCHANT_ID: ${MIDTRANS_MERCHANT_ID}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_NOTIFICATION_CALLBACK_URL: ${MIDTRANS_NOTIFICATION_CALLBACK_URL}
      MIDTRANS_EXPIRE_UNIT: ${MIDTRANS_EXPIRE_UNIT}
      MIDTRANS_EXPIRE_DURATION: ${MIDTRANS_EXPIRE_DURATION}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_USER: ${SMTP_USER}

    networks:
      - traefik-network

    labels: # Label Traefik untuk produksi
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${BACKEND_DOMAIN}`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      # - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=mytlschallenge"
      # - "traefik.http.middlewares.security-headers.headers.SSLRedirect=true"
      - "traefik.http.middlewares.security-headers.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.security-headers.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.security-headers.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.STSPreload=true"
      - "traefik.http.routers.backend.middlewares=security-headers@docker"
      - "traefik.http.services.backend.loadbalancer.server.port=4444"

  frontend:
    image: ${DOCKER_USERNAME}/project-boss-frontend:latest # Menggunakan image yang sudah di-push
    ports:
      - "3000:3000"
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NUXT_PUBLIC_API_BASE: http://backend:4444
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN} # Diambil dari .env di VPS
      NODE_ENV: production

    networks:
      - traefik-network

    labels: # Label Traefik untuk produksi
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      # - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=mytlschallenge"
      # - "traefik.http.middlewares.security-headers.headers.SSLRedirect=true"
      - "traefik.http.middlewares.security-headers.headers.STSSeconds=315360000"
      - "traefik.http.middlewares.security-headers.headers.browserXSSFilter=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.security-headers.headers.STSIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.STSPreload=true"
      - "traefik.http.routers.frontend.middlewares=security-headers@docker"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl if http://localhost:3000/_nuxt/builds/meta/stats.json || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  consumer:
    image: ${DOCKER_USERNAME}/project-boss-consumer:latest
    build:
      context: .
      dockerfile: consumer/Dockerfile
    environment:
      NODE_ENV: production
    networks:
      - default

networks:
  traefik-network:
    external: true
