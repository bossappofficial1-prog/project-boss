services:
  redis:
    image: redis:7-alpine
    container_name: project-boss-redis-dev
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: project-boss-rabbitmq-dev
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672"
      - "15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - default

  backend:
    image: ${DOCKER_USER:-pitok}/project-backend:production
    pull_policy: always
    container_name: bossapp-backend
    env_file:
      - .env.backend
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 1234
    ports:
      - "1234"
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1234 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - default

  consumer:
    image: ${DOCKER_USER:-pitok}/project-consumer:production
    pull_policy: always
    container_name: consumer-dev
    env_file:
      - .env.consumer
    environment:
      - BACKEND_API_URL=http://backend:1234/api/v1
      - RABBITMQ_URL=amqp://rabbitmq
      - NODE_ENV=production

    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend-customer:
    image: ${DOCKER_USER:-pitok}/project-frontend-customer:production
    pull_policy: always
    container_name: frontend-customer-dev
    restart: always
    environment:
      NODE_ENV: production
      SERVER_API_URL: https://api.bossapp.id/api/v1

    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3000"
    env_file:
      - .env.frontend-customer

  dashboard:
    image: ${DOCKER_USER:-pitok}/project-dashboard:production
    pull_policy: always
    container_name: project-boss-dashboard-dev
    ports:
      - "3010"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env.dashboard
    networks:
      - default

  profile:
    image: ${DOCKER_USER:-pitok}/project-profile:production
    pull_policy: always
    container_name: bossapp-profile
    restart: always
    ports:
      - "3020:80"
    networks:
      - default

  nginx-proxy-manager:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx_proxy_manager
    restart: unless-stopped
    ports:
      - "80:80" # Port HTTP publik
      - "81:81" # Port Dasbor Web Admin NPM
      - "443:443" # Port HTTPS publik
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - default
    depends_on:
      - backend
      - frontend-customer
      - dashboard
      - profile
