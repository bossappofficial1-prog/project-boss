services:
  database:
    image: postgres:latest
    container_name: database_boss

    environment:
      - POSTGRES_DB=boss_db
      - POSTGRES_USER=bossuser
      - POSTGRES_PASSWORD=bosspass

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: project-boss-redis-dev
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: project-boss-rabbitmq-dev
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boss -d boss_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
        - DATABASE_URL=postgresql://bossuser:bosspass@database:5432/boss_db?schema=public

    container_name: bossapp-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://bossuser:bosspass@database:5432/boss_db?schema=public
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 4444
    ports:
      - "4444:4444"
    depends_on:
      database:
        condition: service_healthy
    networks:
      - default
