services:
  database:
    image: postgis/postgis:14-3.3
    container_name: database_boss

    environment:
      - POSTGRES_DB=boss_db
      - POSTGRES_USER=bossuser
      - POSTGRES_PASSWORD=bosspass

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: project-boss-redis-dev
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: project-boss-rabbitmq-dev
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=development
        - CLIENT_URL="http://localhost:3000, http://localhost:3001"

    container_name: bossapp-backend
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://bossuser:bosspass@database:5432/boss_db?schema=public
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 1234
    ports:
      - "1234:1234"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1234 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      database:
        condition: service_healthy
    networks:
      - default

  consumer:
    build:
      context: ./consumer
      dockerfile: Dockerfile
    container_name: consumer-dev
    env_file:
      - ./consumer/.env
    environment:
      - BACKEND_API_URL=http://backend:1234/api/v1
      - RABBITMQ_URL=amqp://rabbitmq
      - NODE_ENV=development

    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend-customer:
    build:
      context: ./frontend-customer
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:1234
        NEXT_PUBLIC_API_PREFIX: /api/v1
        NEXT_PUBLIC_SOCKET_URL: http://localhost:1234
        NEXT_PUBLIC_REMOTE_PATTERNS: "http://localhost:1234/**, https://images.unsplash.com/**, https://cheaply-full-leech.ngrok-free.app/**, https://png.pngtree.com/**, https://example.com/**, https://press-parts-outlet.com/**, https://iconlogovector.com/**, https://encrypted-tbn0.gstatic.com/**, https://img2.beritasatu.com/**, https://algorit.ma/wp-content/**"
    container_name: frontend-customer
    restart: always
    environment:
      NODE_ENV: development
      SERVER_API_URL: http://backend:1234/api/v1

    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - ./frontend-customer/.env

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: project-boss-dashboard-local
    ports:
      - "3010:3010"
    environment:
      NODE_ENV: development
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default
    env_file:
      - ./dashboard/.env
