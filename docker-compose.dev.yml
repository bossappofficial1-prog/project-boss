services:
  db:
    image: postgres:15-alpine
    container_name: project-boss-db-dev
    restart: always
    env_file:
      - .env.dev
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: project-boss-redis-dev
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: project-boss-rabbitmq-dev
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-boss-backend-dev
    restart: always
    env_file:
      - .env.dev
    volumes:
      - ./backend:/app/backend # Bind mount source code untuk hot-reloading
      - /app/backend/node_modules # Mencegah host mount menimpa node_modules
    ports:
      - "4444:4444" # Expose port ke host untuk akses langsung dari localhost
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_DATABASE}?schema=public
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 4444
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-boss-frontend-dev
    restart: always
    env_file:
      - .env.dev
    volumes:
      - ./frontend:/app/frontend # Bind mount source code untuk hot-reloading
      - /app/frontend/node_modules
    ports:
      - "3000:3000" # Expose port ke host
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:4444 # Arahkan ke host lokal atau container backend
      NODE_ENV: development
    depends_on:
      - backend

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: project-boss-consumer-dev
    restart: always
    env_file:
      - .env.dev
    volumes:
      - ./consumer:/app/consumer # Bind mount source code untuk hot-reloading
      - /app/consumer/node_modules
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_DATABASE}?schema=public
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  frontend-customer:
    build:
      context: ./frontend-customer
      dockerfile: Dockerfile
    container_name: project-boss-frontend-customer-dev
    restart: always
    env_file:
      - .env.dev
    volumes:
      - ./frontend-customer:/app # Bind mount source code untuk hot-reloading
      - /app/node_modules
    ports:
      - "3001:3000" # Expose port ke host (gunakan port berbeda dari frontend)
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:4444
      NODE_ENV: development
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: project-boss-nginx-dev
    restart: always
    env_file:
      - .env.dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
      - frontend-customer
    networks:
      - default

volumes:
  db_data:
  redis_data:
  rabbitmq_data:
  nginx_logs:

networks:
  default:
    driver: bridge
