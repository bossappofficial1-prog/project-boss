  redis:
    image: redis:7-alpine
    container_name: project-boss-redis-dev
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: project-boss-rabbitmq-dev
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    networks:
      - default

  backend:
    image: ${DOCKER_USER:-pitok}/project-backend:development
    pull_policy: always
    container_name: bossapp-backend
    env_file:
      - .env.backend
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PORT: 1234
    ports:
      - "1234:1234"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 1234 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - default

  consumer:
    image: ${DOCKER_USER:-pitok}/project-consumer:development
    pull_policy: always
    container_name: consumer-dev
    env_file:
      - .env.consumer
    environment:
      - BACKEND_API_URL=http://backend:1234/api/v1
      - RABBITMQ_URL=amqp://rabbitmq
      - NODE_ENV=development

    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend-customer:
    image: ${DOCKER_USER:-pitok}/project-frontend-customer:development
    pull_policy: always
    container_name: frontend-customer-dev
    restart: always
    environment:
      NODE_ENV: development
      SERVER_API_URL: http://backend:1234/api/v1

    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env.frontend-customer
